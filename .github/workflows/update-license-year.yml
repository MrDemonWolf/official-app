name: Update License Year

on:
  schedule:
    # January 1st at 06:00 UTC (12:00 AM CST)
    - cron: "0 6 1 1 *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-year:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update copyright year
        run: |
          CURRENT_YEAR=$(date +%Y)
          sed -i "s/Copyright (c) [0-9]\{4\} MrDemonWolf, Inc\./Copyright (c) $CURRENT_YEAR MrDemonWolf, Inc./" LICENSE

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet LICENSE; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          CURRENT_YEAR=$(date +%Y)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add LICENSE
          git commit -m "chore: update license year to $CURRENT_YEAR"
          git push
